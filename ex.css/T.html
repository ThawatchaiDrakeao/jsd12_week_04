<!doctype html>
<html>
  <head>
    <style>
      
      body 
      {

        background-color: #000000; /* พื้นหลังเป็นสีดำ */
        display: flex; /* ใช้ระบบ Flexbox ในการจัดวาง เสริซข้อมูลเพิ่ม*/
        justify-content: center; /* แนวนอนให้อยู่กึ่งกลาง */
        align-items: center; /* แนวตั้งให้อยู่กึ่งกลาง */
        height: 100vh; /* ความสูงของ body ให้เต็มหน้าจอ */

        h2 {
          color: #ffffff; /*พื้นหลังตัวหนังสือสีขาว*/
          font-size: 350px;
          font-family: Arial; /* ใช้ฟอนต์มาตรฐาน */

          text-shadow:
            6px 4px -0px #ff0050, /* (นอน) (ตั้ง) (ฟุ้ง) */
            -6px -4px 0px #00f2ea;

        }
      }

    </style>
  </head>
  <body>
    <h2>T</h2>
  </body>
</html>
